name: CI/CD Test and Deploy

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Run Pytest Integration Suite
    runs-on: ubuntu-latest

    services:
      # Optional: In-memory Postgres or standard Docker db services if needed
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Set up Python Runtime
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Runtime Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt pytest pytest-asyncio pytest-cov httpx

      - name: Execute Pytest Suite
        cwd: ./backend
        env:
          DATABASE_URL: sqlite+aiosqlite:///:memory:
          JWT_SECRET_KEY: test-secret-key-must-be-long-enough-32-characters
          JWT_REFRESH_SECRET_KEY: test-refresh-secret-key-must-be-long-enough-32
          AI_PROVIDER: mock
          AI_PROVIDER_API_KEY: mock-key
        run: |
          python -m pytest --cov=app tests/ --cov-report=xml

      - name: Upload Coverage Report to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./backend/coverage.xml
          fail_ci_if_error: false

  deploy:
    name: Trigger Render Deployment
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Webhook Rebuild
        env:
          RENDER_DEPLOY_WEBHOOK_URL: ${{ secrets.RENDER_DEPLOY_WEBHOOK }}
        run: |
          if [ -z "$RENDER_DEPLOY_WEBHOOK_URL" ]; then
            echo "RENDER_DEPLOY_WEBHOOK secret is not configured. Skipping deploy trigger."
            exit 0
          fi
          echo "Triggering Render rebuild deployment webhook..."
          curl -X POST "$RENDER_DEPLOY_WEBHOOK_URL"
