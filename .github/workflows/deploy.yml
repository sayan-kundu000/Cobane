name: Deploy to Production

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    name: Trigger Render Deployment
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Trigger Webhook Rebuild
        env:
          RENDER_DEPLOY_WEBHOOK_URL: ${{ secrets.RENDER_DEPLOY_WEBHOOK }}
        run: |
          if [ -z "$RENDER_DEPLOY_WEBHOOK_URL" ]; then
            echo "RENDER_DEPLOY_WEBHOOK secret is not configured. Skipping deploy trigger."
            exit 0
          fi
          echo "Triggering Render rebuild deployment webhook..."
          curl -X POST "$RENDER_DEPLOY_WEBHOOK_URL"
