services:
  # Web service instance running our FastAPI backend container
  - type: web
    name: cobane-backend
    env: docker
    dockerfilePath: Dockerfile.prod
    dockerContext: .
    plan: free
    envVars:
      - key: PORT
        value: "8000"
      - key: DATABASE_URL
        fromDatabase:
          name: cobane-db
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_REFRESH_SECRET_KEY
        generateValue: true
      - key: AI_PROVIDER
        value: openai
      - key: AI_MODEL
        value: gpt-4o
      - key: AI_PROVIDER_API_KEY
        sync: false # User supplies this in Render dashboard
      - key: ALLOWED_ORIGINS
        value: "*" # Recommended to restrict in production
      - key: UPLOAD_DIR
        value: "uploads"
      - key: REPORTS_DIR
        value: "reports"
      - key: LOG_LEVEL
        value: "info"

# PostgreSQL database cluster instance managed by Render
databases:
  - name: cobane-db
    plan: free
    databaseName: cobane
    user: sayan_kundu000
