services:
  # Web service instance running our FastAPI backend container
  - type: web
    name: cobane-backend
    env: docker
    dockerfilePath: backend/Dockerfile.prod
    dockerContext: backend
    plan: free
    envVars:
      - key: PORT
        value: "8000"
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: cobane-db
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_REFRESH_SECRET_KEY
        generateValue: true
      - key: AI_PROVIDER
        value: openai
      - key: AI_MODEL
        value: gpt-4o
      - key: AI_MODEL_NAME
        value: gpt-4o
      - key: AI_API_KEY
        value: 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
      - key: AI_PROVIDER_API_KEY
        value: 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
      - key: ALLOWED_CORS_ORIGINS
        value: "*"
      - key: UPLOAD_DIR
        value: "uploads"
      - key: REPORTS_DIR
        value: "reports"
      - key: LOG_LEVEL
        value: "info"

  # Static site instance serving our React/Vite frontend
  - type: static
    name: cobane-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    plan: free
    envVars:
      - key: VITE_API_URL
        value: https://cobane-backend.onrender.com/api/v1
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

# PostgreSQL database cluster instance managed by Render
databases:
  - name: cobane-db
    plan: free
    databaseName: cobane
    user: sayan_kundu000
